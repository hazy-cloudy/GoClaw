name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: clawpet
  BUILD_TAGS: goolm,stdjson
  BUILD_ENTRY: ./cmd/picoclaw

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            file_os: Linux
            file_arch: x86_64
          - goos: linux
            goarch: arm64
            file_os: Linux
            file_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            file_os: Linux
            file_arch: armv7
          - goos: linux
            goarch: riscv64
            file_os: Linux
            file_arch: riscv64
          - goos: linux
            goarch: loong64
            file_os: Linux
            file_arch: loong64
          - goos: darwin
            goarch: amd64
            file_os: Darwin
            file_arch: x86_64
          - goos: darwin
            goarch: arm64
            file_os: Darwin
            file_arch: arm64
          - goos: windows
            goarch: amd64
            file_os: Windows
            file_arch: x86_64
          - goos: windows
            goarch: arm64
            file_os: Windows
            file_arch: arm64
          - goos: freebsd
            goarch: amd64
            file_os: Freebsd
            file_arch: x86_64
          - goos: freebsd
            goarch: arm64
            file_os: Freebsd
            file_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node (Windows launcher build)
        if: matrix.goos == 'windows'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build launcher embedded frontend (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend

      - name: Prepare onboard workspace
        shell: bash
        run: go generate ./cmd/picoclaw/internal/onboard

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="${BIN}.exe"
          fi

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARM="${{ matrix.goarm || '' }}"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -tags "${BUILD_TAGS}" \
                -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
                -o "dist/${APP_NAME}-launcher.exe" \
                ./web/backend
          fi

      - name: Build petclaw frontend (Windows only)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          cd petclaw
          pnpm install --no-frozen-lockfile
          pnpm build
          # 验证构建产物
          if [ ! -d "out" ]; then
            echo "Error: petclaw build did not produce 'out' directory"
            exit 1
          fi
          echo "Petclaw frontend built successfully"

      - name: Build electron-frontend (Windows only)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          cd electron-frontend
          pnpm install --no-frozen-lockfile
          pnpm build
          # 验证构建产物
          if [ ! -d "dist" ]; then
            echo "Error: electron-frontend build did not produce 'dist' directory"
            exit 1
          fi
          echo "Electron frontend built successfully"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          BASE="${APP_NAME}_${{ matrix.file_os }}_${{ matrix.file_arch }}"
          BIN="${APP_NAME}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            printf '%s\n' \
              '@echo off' \
              'setlocal' \
              'set "SELF_DIR=%~dp0"' \
              '"%SELF_DIR%clawpet.exe" gateway %*' \
              'set "EXIT_CODE=%ERRORLEVEL%"' \
              '' \
              'if "%CLAWPET_NO_PAUSE%"=="1" (' \
              '  exit /b %EXIT_CODE%' \
              ')' \
              '' \
              'echo.' \
              'echo clawpet gateway exited with code %EXIT_CODE%.' \
              'echo Press any key to close...' \
              'pause >nul' \
              'exit /b %EXIT_CODE%' \
              > "${BIN}-gateway.bat"
            zip "${BASE}.zip" "${BIN}.exe" "${BIN}-launcher.exe" "${BIN}-gateway.bat"

            ALL_BASE="${APP_NAME}_AllInOne_${{ matrix.file_os }}_${{ matrix.file_arch }}"
            mkdir -p allinone/scripts
            cp -f "${BIN}.exe" allinone/clawpet.exe
            cp -f "${BIN}.exe" allinone/picoclaw.exe
            cp -f "${BIN}-launcher.exe" allinone/clawpet-launcher.exe
            cp -f "${BIN}-launcher.exe" allinone/picoclaw-launcher.exe
            cp -f "${BIN}-gateway.bat" allinone/clawpet-gateway.bat
            cp -f ../GoClaw-OneClickStart.bat allinone/GoClaw-OneClickStart.bat
            cp -f ../GoClaw-OneClickStart.ps1 allinone/GoClaw-OneClickStart.ps1
            cp -f ../scripts/run-goclaw-dev.ps1 allinone/scripts/run-goclaw-dev.ps1
            
            # 只打包构建后的前端产物，不包含 node_modules 和源码
            # Petclaw 构建产物（静态文件）
            if [ -d ../petclaw/out ]; then
              mkdir -p allinone/petclaw
              cp -r ../petclaw/out allinone/petclaw/out
              # 只复制必要的配置文件
              cp ../petclaw/package.json allinone/petclaw/package.json
              if [ -f ../petclaw/next.config.mjs ]; then
                cp ../petclaw/next.config.mjs allinone/petclaw/next.config.mjs
              fi
              echo "Included petclaw build output"
            fi
            
            # Electron 构建产物
            if [ -d ../electron-frontend/dist ]; then
              mkdir -p allinone/electron-frontend
              cp -r ../electron-frontend/dist allinone/electron-frontend/dist
              # 只复制必要的配置文件
              cp ../electron-frontend/package.json allinone/electron-frontend/package.json
              if [ -f ../electron-frontend/vite.config.ts ]; then
                cp ../electron-frontend/vite.config.ts allinone/electron-frontend/vite.config.ts
              fi
              if [ -f ../electron-frontend/index.html ]; then
                cp ../electron-frontend/index.html allinone/electron-frontend/index.html
              fi
              echo "Included electron-frontend build output"
            fi
            
            (
              cd allinone
              zip -r "../${ALL_BASE}.zip" .
            )
          else
            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'set -eu' \
              'SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
              'exec "$SCRIPT_DIR/clawpet" gateway "$@"' \
              > "${BIN}-gateway"
            chmod +x "${BIN}-gateway"
            tar -czf "${BASE}.tar.gz" "${BIN}" "${BIN}-gateway"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/checksums.txt

          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          gh release upload "${TAG}" dist/* --clobber
