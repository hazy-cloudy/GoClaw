name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: clawpet
  BUILD_TAGS: goolm,stdjson
  BUILD_ENTRY: ./cmd/picoclaw
  LAUNCHER_ENTRY: ./web/backend
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            file_os: Linux
            file_arch: x86_64
          - goos: linux
            goarch: arm64
            file_os: Linux
            file_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            file_os: Linux
            file_arch: armv7
          - goos: linux
            goarch: riscv64
            file_os: Linux
            file_arch: riscv64
          - goos: linux
            goarch: loong64
            file_os: Linux
            file_arch: loong64
          - goos: darwin
            goarch: amd64
            file_os: Darwin
            file_arch: x86_64
          - goos: darwin
            goarch: arm64
            file_os: Darwin
            file_arch: arm64
          - goos: windows
            goarch: amd64
            file_os: Windows
            file_arch: x86_64
          - goos: windows
            goarch: arm64
            file_os: Windows
            file_arch: arm64
          - goos: freebsd
            goarch: amd64
            file_os: Freebsd
            file_arch: x86_64
          - goos: freebsd
            goarch: arm64
            file_os: Freebsd
            file_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node (Windows launcher build)
        if: matrix.goos == 'windows'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        if: matrix.goos == 'windows'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Build launcher embedded frontend (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend

      - name: Prepare onboard workspace
        shell: bash
        run: go generate ./cmd/picoclaw/internal/onboard

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-launcher"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="${BIN}.exe"
            LAUNCHER_BIN="${LAUNCHER_BIN}.exe"
          fi

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARM="${{ matrix.goarm || '' }}"

          # Build Gateway (picoclaw)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

          # Build Launcher (picoclaw-web)
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -tags "${BUILD_TAGS}" \
                -ldflags "-s -w" \
                -o "dist/${LAUNCHER_BIN}" \
                "${LAUNCHER_ENTRY}"
          fi

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
              go build \
                -trimpath \
                -tags "${BUILD_TAGS}" \
                -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
                -o "dist/${APP_NAME}-launcher.exe" \
                ./web/backend
          fi

      - name: Build ClawPet Frontend (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          cd clawpet-frontend/clawpet
          pnpm install --no-frozen-lockfile
          pnpm build

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          BASE="${APP_NAME}_${{ matrix.file_os }}_${{ matrix.file_arch }}"
          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-launcher"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            # Create startup script
            printf '%s\n' \
              '@echo off' \
              'setlocal' \
              'set "SELF_DIR=%~dp0"' \
              '"%SELF_DIR%clawpet-gateway.bat" %*' \
              'set "EXIT_CODE=%ERRORLEVEL%"' \
              '' \
              'if "%CLAWPET_NO_PAUSE%"=="1" (' \
              '  exit /b %EXIT_CODE%' \
              ')' \
              '' \
              'echo.' \
              'echo clawpet gateway exited with code %EXIT_CODE%.' \
              'echo Press any key to close...' \
              'pause >nul' \
              'exit /b %EXIT_CODE%' \
              > "${BIN}-gateway.bat"

            # Standard package
            zip "${BASE}.zip" "${BIN}.exe" "${LAUNCHER_BIN}.exe" "${BIN}-gateway.bat"

            # AllInOne package - complete desktop app
            ALL_BASE="${APP_NAME}_AllInOne_${{ matrix.file_os }}_${{ matrix.file_arch }}"
            mkdir -p allinone/scripts
            
            # Binaries
            cp -f "${BIN}.exe" allinone/picoclaw.exe
            cp -f "${LAUNCHER_BIN}.exe" allinone/picoclaw-web.exe
            cp -f "${BIN}-gateway.bat" allinone/GoClaw-Gateway.bat
            
            # Startup scripts
            cp -f ../GoClaw-OneClickStart.bat allinone/GoClaw-OneClickStart.bat
            cp -f ../GoClaw-OneClickStart.ps1 allinone/GoClaw-OneClickStart.ps1
            cp -f ../scripts/run-goclaw-dev.ps1 allinone/scripts/run-goclaw-dev.ps1
            
            # Frontend (built)
            cp -r ../clawpet-frontend allinone/clawpet-frontend
            
            # Config
            mkdir -p allinone/.goclaw-runtime
            if [ -f ../.goclaw-runtime/config.json ]; then
              cp -f ../.goclaw-runtime/config.json allinone/.goclaw-runtime/config.json
            fi
            mkdir -p allinone/config
            if [ -f ../config/config.example.json ]; then
              cp -f ../config/config.example.json allinone/config/config.example.json
            fi
            
            # Docs
            cp -f ../README.md allinone/README.md
            cp -f ../API.md allinone/API.md
            if [ -f ../GoClaw-OneClickStart.md ]; then
              cp -f ../GoClaw-OneClickStart.md allinone/GoClaw-OneClickStart.md
            fi
            
            # Create README for release package
            cat > allinone/使用说明.md << 'EOF'
# ClawPet 桌面版 - 使用说明

## 快速启动
双击运行 `GoClaw-OneClickStart.bat` 即可自动启动所有服务。

## 组件说明
- **picoclaw.exe**: Gateway 服务 (端口 18790) - AI 核心
- **picoclaw-web.exe**: Launcher 服务 (端口 18800) - Web 管理界面
- **clawpet-frontend**: Electron 桌面客户端 (端口 3000)

## 端口说明
- 18790: Gateway WebSocket (AI 聊天)
- 18800: Launcher REST API (配置管理)
- 3000: 前端界面 (Next.js + Electron)

## 首次使用
1. 双击 GoClaw-OneClickStart.bat
2. 等待浏览器自动打开 http://localhost:3000/onboarding
3. 完成初始化向导配置
4. 开始使用！

## 依赖要求
- Windows 10/11
- PowerShell 5.1+
- 无需安装 Node.js/Go (已内置构建产物)

## 常见问题
Q: 启动失败怎么办？
A: 检查端口 18790/18800/3000 是否被占用，关闭其他程序后重试。

Q: 如何更新？
A: 下载最新版本覆盖解压即可，配置文件会保留。
EOF
            
            # Pack AllInOne
            (
              cd allinone
              zip -r "../${ALL_BASE}.zip" .
            )
          else
            # Linux/macOS package
            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'set -eu' \
              'SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
              'exec "$SCRIPT_DIR/clawpet" gateway "$@"' \
              > "${BIN}-gateway"
            chmod +x "${BIN}-gateway"
            tar -czf "${BASE}.tar.gz" "${BIN}" "${BIN}-gateway"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/checksums.txt

          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          gh release upload "${TAG}" dist/* --clobber
