name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: clawpet
  BUILD_TAGS: goolm,stdjson
  BUILD_ENTRY: ./cmd/picoclaw
  LAUNCHER_ENTRY: ./web/backend
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            file_os: Linux
            file_arch: x86_64
          - goos: linux
            goarch: arm64
            file_os: Linux
            file_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            file_os: Linux
            file_arch: armv7
          - goos: linux
            goarch: riscv64
            file_os: Linux
            file_arch: riscv64
          - goos: linux
            goarch: loong64
            file_os: Linux
            file_arch: loong64
          - goos: darwin
            goarch: amd64
            file_os: Darwin
            file_arch: x86_64
          - goos: darwin
            goarch: arm64
            file_os: Darwin
            file_arch: arm64
          - goos: windows
            goarch: amd64
            file_os: Windows
            file_arch: x86_64
          - goos: windows
            goarch: arm64
            file_os: Windows
            file_arch: arm64
          - goos: freebsd
            goarch: amd64
            file_os: Freebsd
            file_arch: x86_64
          - goos: freebsd
            goarch: arm64
            file_os: Freebsd
            file_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node (for launcher frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Build launcher embedded frontend
        shell: bash
        run: |
          set -euo pipefail
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend

      - name: Prepare onboard workspace
        shell: bash
        run: |
          # Create root workspace directory with default templates
          # These files will be copied to onboard/workspace by go:generate
          mkdir -p workspace/memory workspace/skills
          
          # Create default template files
          cat > workspace/AGENT.md << 'EOF'
          # Agent Instructions
          
          You are a helpful AI assistant.
          EOF
          
          cat > workspace/SOUL.md << 'EOF'
          # Soul
          
          Your personality and behavior guidelines.
          EOF
          
          cat > workspace/USER.md << 'EOF'
          # User Information
          
          Information about the user.
          EOF
          
          cat > workspace/memory/MEMORY.md << 'EOF'
          # Memory
          
          Long-term memory storage.
          EOF
          
          # Run go generate to copy workspace to onboard directory
          go generate ./cmd/picoclaw/internal/onboard

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-web"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="${BIN}.exe"
            LAUNCHER_BIN="${LAUNCHER_BIN}.exe"
          fi

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARM="${{ matrix.goarm || '' }}"

          # Build Gateway (picoclaw)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

          # Build Launcher (picoclaw-web) - built for all platforms (embeds frontend via pnpm build:backend)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w" \
              -o "dist/${LAUNCHER_BIN}" \
              "${LAUNCHER_ENTRY}"

      - name: Build ClawPet Electron App (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          cd clawpet-frontend/clawpet
          
          # Install dependencies
          pnpm install --no-frozen-lockfile
          
          # Build Next.js
          pnpm build
          
          echo "Frontend build complete"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          BASE="${APP_NAME}_${{ matrix.file_os }}_${{ matrix.file_arch }}"
          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-web"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            WIN_BIN="${BIN}.exe"
            WIN_LAUNCHER_BIN="${LAUNCHER_BIN}.exe"

            # Create startup script
            printf '%s\n' \
              '@echo off' \
              'setlocal' \
              'set "SELF_DIR=%~dp0"' \
              '"%SELF_DIR%clawpet.exe" gateway %*' \
              'set "EXIT_CODE=%ERRORLEVEL%"' \
              '' \
              'if "%CLAWPET_NO_PAUSE%"=="1" (' \
              '  exit /b %EXIT_CODE%' \
              ')' \
              '' \
              'echo.' \
              'echo clawpet gateway exited with code %EXIT_CODE%.' \
              'echo Press any key to close...' \
              'pause >nul' \
              'exit /b %EXIT_CODE%' \
              > "${BIN}-gateway.bat"

            # Standard package
            zip "${BASE}.zip" "${WIN_BIN}" "${WIN_LAUNCHER_BIN}" "${BIN}-gateway.bat"

            # Copy Go binaries to Electron project
            cp -f "${WIN_BIN}" ../clawpet-frontend/clawpet/picoclaw.exe
            cp -f "${WIN_LAUNCHER_BIN}" ../clawpet-frontend/clawpet/picoclaw-web.exe
            
            # Build Electron app with electron-builder (pass architecture from matrix)
            cd ../clawpet-frontend/clawpet
            
            # Disable code signing for Windows builds on Linux
            export CSC_IDENTITY_AUTO_DISCOVERY=false
            export ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES=true
            
            if [[ "${{ matrix.file_arch }}" == "x86_64" ]]; then
              npx electron-builder --win --x64 --publish never
            elif [[ "${{ matrix.file_arch }}" == "arm64" ]]; then
              npx electron-builder --win --arm64 --publish never
            else
              npx electron-builder --win --publish never
            fi
            
            # Copy built installers to release directory
            cd dist
            ls -la
            
            # Copy NSIS installer (e.g., ClawPet Setup 0.1.0.exe)
            INSTALLER=$(ls -1 *Setup*.exe 2>/dev/null | head -1)
            if [ -n "$INSTALLER" ]; then
              REPO_DIST="../../../dist"; mkdir -p "${REPO_DIST}"; cp -f "$INSTALLER" "${REPO_DIST}/${APP_NAME}_Setup_${{ matrix.file_os }}_${{ matrix.file_arch }}.exe"
              echo "鉁?NSIS installer: $INSTALLER"
            fi
            
            # Copy portable executable (e.g., ClawPet 0.1.0.exe)
            PORTABLE=$(ls -1 "${APP_NAME}"*.exe 2>/dev/null | grep -v Setup | head -1)
            if [ -n "$PORTABLE" ]; then
              cp -f "$PORTABLE" "${REPO_DIST}/${APP_NAME}_Portable_${{ matrix.file_os }}_${{ matrix.file_arch }}.exe"
              echo "鉁?Portable executable: $PORTABLE"
            fi
            
            # Copy win-unpacked directory for debugging
            cd ../..
            if [ -d "clawpet-frontend/clawpet/dist/win-unpacked" ]; then
              # Ensure backend binaries are in win-unpacked
              cp -f "dist/${WIN_BIN}" clawpet-frontend/clawpet/dist/win-unpacked/
              cp -f "dist/${WIN_LAUNCHER_BIN}" clawpet-frontend/clawpet/dist/win-unpacked/
              
              # Package win-unpacked as zip
              cd clawpet-frontend/clawpet/dist
              zip -r "../../dist/${APP_NAME}_win-unpacked_${{ matrix.file_os }}_${{ matrix.file_arch }}.zip" win-unpacked/
              echo "鉁?Win-unpacked debug package created"
            fi
          else
            # Linux/macOS/FreeBSD package (Gateway + Launcher + startup script)
            printf '%s\n' \
              '#!/usr/bin/env sh' \
              'set -eu' \
              'SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
              'exec "$SCRIPT_DIR/clawpet" gateway "$@"' \
              > "${BIN}-gateway"
            chmod +x "${BIN}-gateway"
            tar -czf "${BASE}.tar.gz" "${BIN}" "${LAUNCHER_BIN}" "${BIN}-gateway"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.exe
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/checksums.txt

          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          gh release upload "${TAG}" dist/* --clobber
