name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: clawpet
  BUILD_TAGS: goolm,stdjson
  BUILD_ENTRY: ./cmd/picoclaw
  LAUNCHER_ENTRY: ./web/backend
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  build-linux-macos-freebsd:
    runs-on: ${{ matrix.goos == 'darwin' && 'macos-latest' || 'ubuntu-latest' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            file_os: Linux
            file_arch: x86_64
          - goos: linux
            goarch: arm64
            file_os: Linux
            file_arch: arm64
          - goos: linux
            goarch: arm
            goarm: "7"
            file_os: Linux
            file_arch: armv7
          - goos: linux
            goarch: riscv64
            file_os: Linux
            file_arch: riscv64
          - goos: linux
            goarch: loong64
            file_os: Linux
            file_arch: loong64
          - goos: darwin
            goarch: amd64
            file_os: Darwin
            file_arch: x86_64
          - goos: darwin
            goarch: arm64
            file_os: Darwin
            file_arch: arm64
          - goos: freebsd
            goarch: amd64
            file_os: Freebsd
            file_arch: x86_64
          - goos: freebsd
            goarch: arm64
            file_os: Freebsd
            file_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node (for launcher frontend build)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Build launcher embedded frontend
        shell: bash
        run: |
          set -euo pipefail
          cd web/frontend
          pnpm install --no-frozen-lockfile
          pnpm build:backend

      - name: Prepare onboard workspace
        shell: bash
        run: |
          # Create root workspace directory with default templates
          # These files will be copied to onboard/workspace by go:generate
          mkdir -p workspace/memory workspace/skills
          
          # Create default template files
          cat > workspace/AGENT.md << 'EOF'
          # Agent Instructions
          
          You are a helpful AI assistant.
          EOF
          
          cat > workspace/SOUL.md << 'EOF'
          # Soul
          
          Your personality and behavior guidelines.
          EOF
          
          cat > workspace/USER.md << 'EOF'
          # User Information
          
          Information about the user.
          EOF
          
          cat > workspace/memory/MEMORY.md << 'EOF'
          # Memory
          
          Long-term memory storage.
          EOF
          
          # Run go generate to copy workspace to onboard directory
          go generate ./cmd/picoclaw/internal/onboard

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-web"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="${BIN}.exe"
            LAUNCHER_BIN="${LAUNCHER_BIN}.exe"
          fi

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          GOARM="${{ matrix.goarm || '' }}"

          # Build Gateway (picoclaw)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

          # Build Launcher (picoclaw-web) - built for all platforms (embeds frontend via pnpm build:backend)
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} GOARM="${GOARM}" CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w" \
              -o "dist/${LAUNCHER_BIN}" \
              "${LAUNCHER_ENTRY}"

      - name: Build ClawPet Electron App (Windows)
        if: matrix.goos == 'windows'
        shell: bash
        run: |
          set -euo pipefail
          cd clawpet-frontend/clawpet
          
          # Use npm instead of pnpm to avoid symlink issues with electron-builder
          # pnpm uses symlinks which electron-builder cannot properly package
          npm install
          
          # Build Next.js
          npm run build
          
          echo "Frontend build complete"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          BASE="${APP_NAME}_${{ matrix.file_os }}_${{ matrix.file_arch }}"
          BIN="${APP_NAME}"
          LAUNCHER_BIN="${APP_NAME}-web"

          # Linux/macOS/FreeBSD package (Gateway + Launcher + startup script)
          printf '%s\n' \
            '#!/usr/bin/env sh' \
            'set -eu' \
            'SCRIPT_DIR="$(CDPATH= cd -- "$(dirname -- "$0")" && pwd)"' \
            'exec "$SCRIPT_DIR/clawpet" gateway "$@"' \
            > "${BIN}-gateway"
          chmod +x "${BIN}-gateway"
          tar -czf "${BASE}.tar.gz" "${BIN}" "${LAUNCHER_BIN}" "${BIN}-gateway"

      - name: Package macOS Electron App
        if: matrix.goos == 'darwin'
        shell: bash
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          
          # Copy Go binaries to Electron project
          cp dist/${APP_NAME} clawpet-frontend/clawpet/picoclaw
          cp dist/${APP_NAME}-web clawpet-frontend/clawpet/picoclaw-web
          
          # Build Electron app for macOS
          cd clawpet-frontend/clawpet
          
          # Install dependencies
          npm install
          
          # Build Next.js
          npm run build
          
          # Package with electron-builder
          if [[ "${{ matrix.goarch }}" == "arm64" ]]; then
            npx electron-builder --mac --arm64 --publish never
          elif [[ "${{ matrix.goarch }}" == "amd64" ]]; then
            npx electron-builder --mac --x64 --publish never
          else
            npx electron-builder --mac --publish never
          fi
          
          # Copy Electron app zip to release directory
          cd dist
          
          # Find Electron builder output
          electronZip=$(ls -t ClawPet*.zip 2>/dev/null | head -1)
          if [[ -n "$electronZip" ]]; then
            repoDist="../../../dist"
            mkdir -p "$repoDist"
            cp "$electronZip" "${repoDist}/${APP_NAME}_Electron_${{ matrix.file_os }}_${{ matrix.file_arch }}.zip"
            echo "✅ Electron app zip: $electronZip"
          else
            echo "⚠️  No Electron zip found"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('-arm{0}', matrix.goarm) || '' }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            file_os: Windows
            file_arch: x86_64
          - goos: windows
            goarch: arm64
            file_os: Windows
            file_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Setup Node (for Electron app)
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Prepare onboard workspace
        shell: bash
        run: |
          # Create root workspace directory with default templates
          mkdir -p workspace/memory workspace/skills
          
          # Create default template files
          cat > workspace/AGENT.md << 'EOF'
          # Agent Instructions
          
          You are a helpful AI assistant.
          EOF
          
          cat > workspace/SOUL.md << 'EOF'
          # Soul
          
          Your personality and behavior guidelines.
          EOF
          
          cat > workspace/USER.md << 'EOF'
          # User Information
          
          Information about the user.
          EOF
          
          cat > workspace/memory/MEMORY.md << 'EOF'
          # Memory
          
          Long-term memory storage.
          EOF
          
          # Run go generate to copy workspace to onboard directory
          go generate ./cmd/picoclaw/internal/onboard

      - name: Build Go Binaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}.exe"
          LAUNCHER_BIN="${APP_NAME}-web.exe"

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Build Gateway (picoclaw)
          GOOS=windows GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

          # Build Launcher (picoclaw-web)
          GOOS=windows GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w" \
              -o "dist/${LAUNCHER_BIN}" \
              "${LAUNCHER_ENTRY}"

      - name: Build ClawPet Electron App
        shell: bash
        run: |
          set -euo pipefail
          cd clawpet-frontend/clawpet
          
          # Use npm instead of pnpm to avoid symlink issues with electron-builder
          npm install
          
          # Build Next.js
          npm run build
          
          echo "Frontend build complete"

      - name: Package Windows
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: "true"
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location dist

          $BASE = "${{ env.APP_NAME }}_${{ matrix.file_os }}_${{ matrix.file_arch }}"
          $WIN_BIN = "${{ env.APP_NAME }}.exe"
          $WIN_LAUNCHER_BIN = "${{ env.APP_NAME }}-web.exe"

          # Create startup script
          @'
          @echo off
          setlocal
          set "SELF_DIR=%~dp0"
          "%SELF_DIR%clawpet.exe" gateway %*
          set "EXIT_CODE=%ERRORLEVEL%"

          if "%CLAWPET_NO_PAUSE%"=="1" (
            exit /b %EXIT_CODE%
          )

          echo.
          echo clawpet gateway exited with code %EXIT_CODE%.
          echo Press any key to close...
          pause >nul
          exit /b %EXIT_CODE%
          '@ | Out-File -FilePath "${{ env.APP_NAME }}-gateway.bat" -Encoding ASCII

          # Standard package using PowerShell Compress-Archive (Backend only)
          $zipFiles = @($WIN_BIN, $WIN_LAUNCHER_BIN, "${{ env.APP_NAME }}-gateway.bat")
          $standardZip = "${BASE}_backend.zip"
          Compress-Archive -Path $zipFiles -DestinationPath $standardZip -Force
          Write-Host "✅ Standard backend package created: $standardZip"

          # Copy Go binaries to Electron project
          Copy-Item -Path $WIN_BIN -Destination "../clawpet-frontend/clawpet/picoclaw.exe" -Force
          Copy-Item -Path $WIN_LAUNCHER_BIN -Destination "../clawpet-frontend/clawpet/picoclaw-web.exe" -Force
          
          # Build Electron app with electron-builder
          Set-Location ../clawpet-frontend/clawpet
          
          if ("${{ matrix.file_arch }}" -eq "x86_64") {
            npx electron-builder --win --x64 --publish never
          } elseif ("${{ matrix.file_arch }}" -eq "arm64") {
            npx electron-builder --win --arm64 --publish never
          } else {
            npx electron-builder --win --publish never
          }
          
          # Copy Electron app zip to release directory
          Set-Location dist
          Get-ChildItem
          
          # Find Electron builder output (usually in win-unpacked or as installer)
          $electronZip = Get-ChildItem -Filter "ClawPet*.zip" | Select-Object -First 1
          if ($electronZip) {
            $repoDist = "../../../dist"
            New-Item -ItemType Directory -Force -Path $repoDist | Out-Null
            $electronDest = "${repoDist}/${{ env.APP_NAME }}_Electron_${{ matrix.file_os }}_${{ matrix.file_arch }}.zip"
            Copy-Item -Path $electronZip.FullName -Destination $electronDest -Force
            Write-Host "✅ Electron app zip: $($electronZip.Name)"
          } else {
            Write-Host "⚠️  No Electron zip found, checking for win-unpacked..." -ForegroundColor Yellow
          }
          
          # Copy win-unpacked directory for debugging
          Set-Location ../..
          if (Test-Path "clawpet-frontend/clawpet/dist/win-unpacked") {
            # Ensure backend binaries are in win-unpacked
            Copy-Item -Path "dist/${WIN_BIN}" -Destination "clawpet-frontend/clawpet/dist/win-unpacked/" -Force
            Copy-Item -Path "dist/${WIN_LAUNCHER_BIN}" -Destination "clawpet-frontend/clawpet/dist/win-unpacked/" -Force
            
            # Package win-unpacked as zip
            Set-Location clawpet-frontend/clawpet/dist
            Compress-Archive -Path "win-unpacked" -DestinationPath "../../dist/${{ env.APP_NAME }}_win-unpacked_${{ matrix.file_os }}_${{ matrix.file_arch }}.zip" -Force
            Write-Host "✅ Win-unpacked debug package created"
          }

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: [build-linux-macos-freebsd, build-windows]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          sha256sum dist/* > dist/checksums.txt

          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          gh release upload "${TAG}" dist/* --clobber
