name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  APP_NAME: picoclaw
  BUILD_TAGS: goolm,stdjson
  BUILD_ENTRY: ./cmd/picoclaw

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          BIN="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            BIN="${BIN}.exe"
          fi

          VERSION="${GITHUB_REF_NAME}"
          SHORT_SHA="${GITHUB_SHA::7}"
          BUILD_TIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
            go build \
              -trimpath \
              -tags "${BUILD_TAGS}" \
              -ldflags "-s -w -X github.com/sipeed/picoclaw/pkg/config.Version=${VERSION} -X github.com/sipeed/picoclaw/pkg/config.GitCommit=${SHORT_SHA} -X github.com/sipeed/picoclaw/pkg/config.BuildTime=${BUILD_TIME}" \
              -o "dist/${BIN}" \
              "${BUILD_ENTRY}"

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          cd dist

          BASE="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          BIN="${APP_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"

          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip "${BASE}.zip" "${BIN}.exe"
          else
            tar -czf "${BASE}.tar.gz" "${BIN}"
          fi

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          merge-multiple: true
          path: dist

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes
          fi

          gh release upload "${TAG}" dist/* --clobber
