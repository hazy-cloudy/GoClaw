<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#FFE4E1"/>
      <stop offset="100%" style="stop-color:#FFB6C1"/>
    </radialGradient>
  </defs>
  <!-- Body -->
  <ellipse cx="50" cy="55" rx="35" ry="30" fill="url(#bodyGrad)"/>
  <!-- Head -->
  <circle cx="50" cy="35" r="25" fill="url(#bodyGrad)"/>
  <!-- Eyes -->
  <ellipse cx="42" cy="32" rx="4" ry="5" fill="#333"/>
  <ellipse cx="58" cy="32" rx="4" ry="5" fill="#333"/>
  <circle cx="43" cy="31" r="1.5" fill="white"/>
  <circle cx="59" cy="31" r="1.5" fill="white"/>
  <!-- Cheeks -->
  <ellipse cx="35" cy="38" rx="5" ry="3" fill="#FF69B4" opacity="0.5"/>
  <ellipse cx="65" cy="38" rx="5" ry="3" fill="#FF69B4" opacity="0.5"/>
  <!-- Mouth -->
  <path d="M 45 42 Q 50 47 55 42" stroke="#FF6B6B" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Ears -->
  <path d="M 30 20 Q 35 10 40 20" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  <path d="M 60 20 Q 65 10 70 20" fill="#FFB6C1" stroke="#FF69B4" stroke-width="1"/>
  <!-- Inner ears -->
  <path d="M 33 19 Q 35 14 38 19" fill="#FF69B4"/>
  <path d="M 62 19 Q 65 14 67 19" fill="#FF69B4"/>
  <!-- Paws -->
  <ellipse cx="30" cy="75" rx="8" ry="6" fill="#FFB6C1"/>
  <ellipse cx="70" cy="75" rx="8" ry="6" fill="#FFB6C1"/>
  <!-- Tail -->
  <path d="M 80 55 Q 95 50 90 60 Q 85 70 80 60" fill="#FFB6C1"/>
</svg>
